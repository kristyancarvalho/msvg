name: Bug
description: Report incorrect behavior, a regression, invalid output, or a workflow failure
title: "bug/<area>: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of MSVG is affected?
      options:
        - repo
        - core
        - svg
        - layout
        - theme
        - remark
        - markdown-it
        - astro
        - cli
        - docker
        - examples
        - test
        - docs
        - accessibility
        - release
        - ci
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What is broken and what is the impact?
      placeholder: Describe the incorrect behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the diagram source or commands needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Docker commands that should pass once this is fixed.
      value: |
        docker compose run --rm msvg npm run check
        docker compose run --rm msvg npm run test
        docker compose run --rm msvg npm run build
        docker compose run --rm msvg npm run verify
      render: shell
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Share relevant environment details.
      placeholder: |
        OS:
        Node version:
        MSVG version:
        Install method (npm package, source, Docker):

  - type: input
    id: milestone
    attributes:
      label: Related release milestone
      placeholder: v0.2.0
