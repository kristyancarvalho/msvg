name: Task
description: Track operational, structural, testing, documentation, release, or maintenance work
title: "task/<area>: "
labels: ["task"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of MSVG is affected?
      options:
        - repo
        - core
        - svg
        - layout
        - theme
        - remark
        - markdown-it
        - astro
        - cli
        - docker
        - examples
        - test
        - docs
        - accessibility
        - release
        - ci
        - other
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Problem or goal
      description: Why is this work needed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should be done?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this work?
    validations:
      required: true

  - type: textarea
    id: outofscope
    attributes:
      label: Out of scope
      description: What is explicitly not included?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this task is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Docker commands that confirm the work.
      value: |
        docker compose run --rm msvg npm run check
        docker compose run --rm msvg npm run test
        docker compose run --rm msvg npm run build
        docker compose run --rm msvg npm run verify
      render: shell
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Related release milestone
      placeholder: v0.2.0
