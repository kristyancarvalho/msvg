<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 365.8" width="600" height="365.8" role="img" aria-labelledby="msvg-release-path-d-title msvg-release-path-d-desc"><title id="msvg-release-path-d-title">MSVG release path</title><desc id="msvg-release-path-d-desc">The path from the core parser to the first complete release.</desc><rect width="600" height="365.8" fill="#0f0f11"/><line x1="100" y1="32" x2="100" y2="333.8" stroke="#383845" stroke-width="2"/><text x="82" y="68.975" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-weight="normal" fill="#9090a8">Phase 1</text><circle cx="100" cy="62.225" r="8" fill="#0f0f11" stroke="#4caf7a" stroke-width="2.5"/><circle cx="100" cy="62.225" r="5" fill="#4caf7a"/><line x1="108" y1="62.225" x2="128" y2="62.225" stroke="#383845" stroke-width="1"/><rect x="128" y="32" width="440" height="60.45" rx="8" ry="8" fill="#1a1a1f" stroke="#383845" stroke-width="1.5"/><text x="348" y="57" text-anchor="middle" font-size="15" font-family="system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-weight="600" fill="#e8e8f0">Core parser</text><text x="348" y="78.25" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-weight="normal" fill="#9090a8">Parse and validate MSVG declarations</text><text x="82" y="149.425" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-weight="normal" fill="#9090a8">Phase 2</text><circle cx="100" cy="142.675" r="8" fill="#0f0f11" stroke="#4caf7a" stroke-width="2.5"/><circle cx="100" cy="142.675" r="5" fill="#4caf7a"/><line x1="108" y1="142.675" x2="128" y2="142.675" stroke="#383845" stroke-width="1"/><rect x="128" y="112.45" width="440" height="60.45" rx="8" ry="8" fill="#1a1a1f" stroke="#383845" stroke-width="1.5"/><text x="348" y="137.45" text-anchor="middle" font-size="15" font-family="system-ui, -apple-system, &#39;S