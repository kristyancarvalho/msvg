type: architecture
title: "The MSVG package ecosystem"
description: "How the MSVG packages connect, from authoring through rendering to integrations."
theme: dark
direction: LR

groups:
  authoring:
    label: "Authoring"
    components:
      - markdown
      - cli

  rendering:
    label: "Rendering"
    components:
      - core
      - svg

  integrations:
    label: "Integrations"
    components:
      - astro
      - remark
      - markdownIt

components:
  markdown:
    label: "Markdown"
    kind: content

  cli:
    label: "@markdown-utils/msvg-cli"
    kind: build

  core:
    label: "@markdown-utils/msvg-core"
    kind: service

  svg:
    label: "@markdown-utils/msvg-svg"
    kind: output

  astro:
    label: "@markdown-utils/msvg-astro"
    kind: external

  remark:
    label: "@markdown-utils/msvg-remark"
    kind: external

  markdownIt:
    label: "@markdown-utils/msvg-markdown-it"
    kind: external

connections:
  - markdown -> core: "parse"
  - cli -> core: "validate"
  - core -> svg: "render"
  - astro -> remark: "uses"
  - remark -> core: "parse"
  - markdownIt -> core: "parse"
